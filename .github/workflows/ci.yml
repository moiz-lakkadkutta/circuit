name: CI

on:
  push:
    branches: [main]
  pull_request: {}

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + pytest
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest
      # ngspice is intentionally NOT installed: the integration tests skip when
      # the binary is absent (see tests/conftest.py), so this run exercises the
      # ~66 pure-logic tests deterministically, independent of any ngspice
      # version's log-message wording.
      - name: Run tests (pure-logic; ngspice tests skip)
        run: pytest -q

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Bandit security scan
        run: |
          pip install bandit
          bandit -r src/ -q

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t spiceguard -f docker/Dockerfile .
      - name: Smoke test the image (ngspice bundled)
        run: |
          set -e
          docker run --rm spiceguard --version
          # healthy netlist → TRUSTWORTHY → exit 0
          docker run --rm -v "$PWD/tests/netlists:/work" spiceguard n5_healthy_control.cir
          # missing ground → SUSPECT → exit 2
          code=0
          docker run --rm -v "$PWD/tests/netlists:/work" spiceguard n1_missing_ground.cir || code=$?
          test "$code" -eq 2 || { echo "expected SUSPECT (exit 2), got $code"; exit 1; }
